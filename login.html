<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lab Nexis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            purple: '#7c3aed',
                            blue: '#2563eb',
                            emerald: '#059669',
                            dark: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfdff; }
        
        .gradient-bg {
            background: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.08) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.08) 0px, transparent 50%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.6);
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.1);
        }

        .input-focus:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-[450px]">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-brand-purple to-brand-blue rounded-2xl text-white shadow-xl mb-4 transition-transform hover:rotate-6 cursor-pointer">
                <i class="fas fa-layer-group text-2xl"></i>
            </div>
            <h1 class="text-3xl font-[900] tracking-tight text-brand-dark">Welcome <span class="gradient-text">Back</span></h1>
            <p class="text-slate-400 font-medium text-sm mt-2 font-semibold">Sign in to your Lab Nexis dashboard</p>
        </div>

        <div class="glass-panel rounded-[2.5rem] p-8 md:p-10">
            <form action="#" class="space-y-6">
                <div>
                    <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Work Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-300">
                            <i class="far fa-envelope text-sm"></i>
                        </span>
                        <input type="email" placeholder="name@company.com" class="w-full pl-11 pr-4 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 placeholder:text-slate-300 input-focus transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label class="text-[11px] font-black uppercase tracking-widest text-slate-400">Password</label>
                        <a href="#" class="text-[10px] font-black uppercase tracking-widest text-brand-blue hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-300">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input type="password" placeholder="••••••••" class="w-full pl-11 pr-12 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 placeholder:text-slate-300 input-focus transition-all">
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-300 hover:text-slate-500">
                            <i class="far fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center space-x-2 ml-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-200 text-brand-blue focus:ring-brand-blue transition-all cursor-pointer">
                    <label for="remember" class="text-xs font-bold text-slate-500 cursor-pointer">Stay signed in for 30 days</label>
                </div>

                <button type="submit" class="w-full btn-gradient py-4 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl mt-4">
                    Secure Login
                </button>
            </form>

            <div class="mt-10 relative">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-black tracking-widest"><span class="bg-white px-4 text-slate-300">Or continue with</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button class="flex items-center justify-center py-3 px-4 border border-slate-100 rounded-xl hover:bg-slate-50 transition-all font-bold text-xs text-slate-600 space-x-2">
                    <i class="fab fa-google text-red-500"></i>
                    <span>Google</span>
                </button>
                <button class="flex items-center justify-center py-3 px-4 border border-slate-100 rounded-xl hover:bg-slate-50 transition-all font-bold text-xs text-slate-600 space-x-2">
                    <i class="fab fa-apple text-slate-900 text-sm"></i>
                    <span>Apple</span>
                </button>
            </div>
        </div>

        <p class="text-center mt-10 text-xs font-bold text-slate-400 tracking-tight">
            Don't have an account? <a href="subscription.html" class="text-brand-blue hover:underline">Pick a plan to start</a>
        </p>

        <div class="mt-12 flex justify-center items-center space-x-6 text-[10px] font-black uppercase tracking-[0.2em] text-slate-300">
            <span class="flex items-center"><i class="fas fa-shield-alt mr-2"></i> ISO 27001</span>
            <span class="flex items-center"><i class="fas fa-lock mr-2"></i> SSL Encrypted</span>
        </div>
    </div>

</body>
</html>
